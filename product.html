<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="logo/favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Produit — Little Symphony</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="main.css">
<style>
/* → variables in main.css */
body{font-family:var(--sans);background:#fff;color:var(--charcoal);-webkit-font-smoothing:antialiased}
img{display:block;max-width:100%}
button{cursor:pointer;font-family:var(--sans)}
a{text-decoration:none;color:inherit}

/* BREADCRUMB */
.breadcrumb{max-width:1280px;margin:0 auto;padding:88px 2rem 0;
  display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-muted)}
.breadcrumb a{color:var(--text-muted);transition:color 0.2s}
.breadcrumb a:hover{color:var(--charcoal)}
.breadcrumb span{color:var(--charcoal);font-weight:500}

/* PRODUCT LAYOUT */
.product-wrap{max-width:1100px;margin:0 auto;padding:2rem 2rem 5rem;
  display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:start}
@media(max-width:720px){.product-wrap{grid-template-columns:1fr;gap:2rem;padding:1.5rem 1rem 4rem}}

/* IMAGE SIDE */
.img-sticky{position:sticky;top:88px}
@media(max-width:768px){.img-sticky{position:static;top:auto}}
.img-main{width:100%;aspect-ratio:1;border-radius:20px;object-fit:cover;
  background:var(--primary-xlight);transition:opacity 0.3s}
.img-thumbs{display:flex;gap:10px;margin-top:12px}
.img-thumb{width:72px;height:72px;border-radius:10px;object-fit:cover;
  border:2px solid transparent;cursor:pointer;transition:border-color 0.2s;flex-shrink:0;
  background:var(--primary-xlight)}
.img-thumb.active{border-color:var(--primary)}

/* INFO SIDE */
.badge-row{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:0.1em;
  text-transform:uppercase;padding:4px 12px;border-radius:20px}
.badge-new{background:#E8F5E9;color:#2E7D32}
.badge-promo{background:#FFF3E0;color:#E65100}
.badge-cat{background:var(--primary-xlight);color:var(--primary-dark);font-size:11px;
  font-weight:600;letter-spacing:0.08em;text-transform:uppercase}
.product-name{font-family:var(--serif);font-size:clamp(1.6rem,3vw,2.2rem);
  color:var(--charcoal);margin-bottom:0.4rem;line-height:1.2}
.product-sub{font-size:14px;color:var(--text-muted);margin-bottom:1.2rem}
.stars{display:flex;align-items:center;gap:6px;margin-bottom:1.4rem}
.stars svg{width:14px;height:14px}
.stars-count{font-size:12px;color:var(--text-muted)}
.price-row{display:flex;align-items:baseline;gap:12px;margin-bottom:1.8rem}
.price{font-size:1.9rem;font-weight:700;color:var(--charcoal)}
.old-price{font-size:1rem;color:var(--text-muted);text-decoration:line-through}
.promo-pct{font-size:12px;font-weight:700;color:#E65100;background:#FFF3E0;
  padding:3px 10px;border-radius:20px}
.divider{border:none;border-top:1px solid var(--border);margin:1.4rem 0}
.product-desc{font-size:14.5px;color:var(--text-soft);line-height:1.85;margin-bottom:1.8rem}
.attrs{display:grid;grid-template-columns:1fr 1fr;gap:10px 20px;margin-bottom:1.8rem}
.attr strong{display:block;font-size:11px;font-weight:600;color:var(--charcoal);
  text-transform:uppercase;letter-spacing:0.06em;margin-bottom:2px}
.attr span{font-size:13px;color:var(--text-muted)}
.qty-row{display:flex;align-items:center;gap:1rem;margin-bottom:1.2rem}
.qty-label{font-size:13px;font-weight:500;color:var(--charcoal);min-width:60px}
.qty-ctrl{display:flex;align-items:center;gap:12px;background:var(--primary-xlight);
  border-radius:40px;padding:4px 6px}
.qty-btn{width:34px;height:34px;border-radius:50%;border:none;background:#fff;
  font-size:18px;font-weight:300;display:flex;align-items:center;justify-content:center;
  box-shadow:var(--shadow-sm);transition:all 0.2s;color:var(--charcoal)}
.qty-btn:hover{background:var(--primary);color:#fff}
.qty-val{font-size:15px;font-weight:600;min-width:24px;text-align:center}
.btn-cart{width:100%;padding:16px;border-radius:40px;background:var(--primary);color:#fff;
  border:none;font-size:15px;font-weight:600;letter-spacing:0.02em;
  transition:all 0.25s;box-shadow:0 4px 20px rgba(201,160,154,0.4);margin-bottom:0.8rem;
  display:flex;align-items:center;justify-content:center;gap:10px}
.btn-cart:hover{background:var(--primary-dark);transform:translateY(-2px)}
.btn-cart.added{background:#2E7D32}
.btn-wish{width:100%;padding:14px;border-radius:40px;background:transparent;
  color:var(--charcoal);border:1.5px solid var(--border);font-size:14px;font-weight:500;
  display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.2s}
.btn-wish:hover{border-color:var(--primary);color:var(--primary)}
.btn-wish svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.btn-wish.wished svg{fill:var(--primary);stroke:var(--primary)}

/* SUGGESTIONS */
.suggestions{max-width:1100px;margin:0 auto;padding:0 2rem 5rem}
.suggestions h2{font-family:var(--serif);font-size:1.5rem;margin-bottom:1.5rem}
.suggest-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem}
@media(max-width:720px){.suggest-grid{grid-template-columns:repeat(2,1fr)}}
.suggest-card{border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;
  transition:box-shadow 0.25s;cursor:pointer;background:#fff}
.suggest-card:hover{box-shadow:var(--shadow-md)}
.suggest-img{width:100%;aspect-ratio:1;object-fit:cover;background:var(--primary-xlight)}
.suggest-info{padding:12px}
.suggest-name{font-size:13px;font-weight:500;margin-bottom:4px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.suggest-price{font-size:13px;font-weight:700;color:var(--primary-dark)}

/* NAV SCROLLED */

/* TOAST */
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(100px);
  background:var(--charcoal);color:#fff;padding:14px 24px;border-radius:40px;
  font-size:14px;font-weight:500;z-index:999;transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
  display:flex;align-items:center;gap:10px;white-space:nowrap}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
</style>
</head>
<body>

<nav id="main-nav"></nav>

<div class="breadcrumb" id="breadcrumb">
  <a href="boutique.html">Boutique</a>
  <span class="breadcrumb-sep">›</span>
  <a href="index.html" id="bc-cat">Catégorie</a>
  <span class="breadcrumb-sep">›</span>
  <span id="bc-name">Produit</span>
</div>

<div class="product-wrap">
  <!-- IMAGE -->
  <div class="img-sticky">
    <img class="img-main" id="img-main" src="" alt="">
    <div class="img-thumbs" id="img-thumbs"></div>
  </div>

  <!-- INFO -->
  <div class="product-info">
    <div class="badge-row" id="badge-row"></div>
    <h1 class="product-name" id="product-name"></h1>
    <div class="product-sub" id="product-sub"></div>
    <div class="stars" id="stars"></div>
    <div class="price-row">
      <span class="price" id="price"></span>
      <span class="old-price" id="old-price" style="display:none"></span>
      <span class="promo-pct" id="promo-pct" style="display:none"></span>
    </div>
    <hr class="divider">
    <p class="product-desc" id="product-desc"></p>
    <div class="attrs" id="attrs"></div>
    <hr class="divider">
    <div id="stock-badge" style="margin-bottom:14px;font-size:13px;font-weight:600"></div>
    <div class="qty-row">
      <span class="qty-label">Quantité</span>
      <div class="qty-ctrl">
        <button class="qty-btn" onclick="changeQty(-1)">−</button>
        <span class="qty-val" id="qty-val">1</span>
        <button class="qty-btn" onclick="changeQty(1)">+</button>
      </div>
    </div>
    <button class="btn-cart" id="btn-cart" onclick="addToCartPage()">
      <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      Ajouter au panier
    </button>
    <button class="btn-wish" id="btn-wish" onclick="toggleWish()">
      <svg viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      Ajouter à ma liste de souhaits
    </button>
  </div>
</div>

<!-- SUGGESTIONS -->
<div class="suggestions">
  <h2>Vous aimerez aussi</h2>
  <div class="suggest-grid" id="suggest-grid"></div>
</div>

<div id="main-footer"></div>

<!-- TOAST -->
<div class="toast" id="toast">
  <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
  <span id="toast-msg">Ajouté au panier !</span>
</div>

<script src="_shared.js"></script>
<script>
renderNav('product');
renderFooter();

var qty = 1;
var product = null;
var wished = false;

const DESCS = {
  default: "Produit sélectionné avec soin par notre équipe Little Symphony pour le bien-être de votre enfant. Qualité premium, matériaux certifiés, adapté aux petits.",
};

const ATTRS_MAP = {
  default: [["Qualité","Premium"],["Certifié","CE"],["Garantie","2 ans"],["Origine","UE"]],
};

function parsePrice(str) {
  return parseFloat((str||'0').replace(/[^\d,]/g,'').replace(',','.')) || 0;
}

function init() {
  product = CurrentProduct.get();
  if (!product) { window.location.href = 'index.html'; return; }

  // Breadcrumb
  document.title = product.name + ' — Little Symphony';
  const bcCatEl = document.getElementById('bc-cat');
  bcCatEl.textContent = product.catName || 'Catégorie';
  const catMeta = CATS_META.find(c => c.name === product.catName || c.nameFull === product.catName);
  bcCatEl.href = 'boutique.html' + (catMeta ? '#' + catMeta.key : '');
  document.getElementById('bc-name').textContent = product.name;

  // Images
  const allImages = (product.images && product.images.length > 0)
    ? product.images
    : (product.img ? [product.img] : []);
  const mainImg = document.getElementById('img-main');
  mainImg.src = allImages[0] || '';
  mainImg.alt = product.name;
  const thumbsEl = document.getElementById('img-thumbs');
  thumbsEl.innerHTML = '';
  if (allImages.length > 1) {
    allImages.forEach((src, i) => {
      const t = document.createElement('img');
      t.className = 'img-thumb' + (i === 0 ? ' active' : '');
      t.src = src; t.alt = '';
      t.onclick = () => {
        mainImg.src = src;
        document.querySelectorAll('.img-thumb').forEach(x => x.classList.remove('active'));
        t.classList.add('active');
      };
      thumbsEl.appendChild(t);
    });
  }

  // Badges
  let badges = `<span class="badge badge-cat">${product.catName||''}</span>`;
  if (product.badge==='new')   badges += '<span class="badge badge-new">Nouveau</span>';
  if (product.badge==='promo') badges += '<span class="badge badge-promo">Promo</span>';
  document.getElementById('badge-row').innerHTML = badges;

  // Name / sub
  document.getElementById('product-name').textContent = product.name;
  document.getElementById('product-sub').textContent = product.sub;

  // Stars
  const ratings = ['4.8 (32 avis)','4.5 (18 avis)','4.3 (9 avis)','4.9 (47 avis)','4.6 (23 avis)'];
  const rating = ratings[Math.floor(Math.random()*ratings.length)];
  const stars5 = [1,2,3,4].map(()=>'<svg viewBox="0 0 24 24" style="fill:#F59E0B;stroke:none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>').join('')
    + '<svg viewBox="0 0 24 24" style="fill:#E5E7EB;stroke:none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>';
  document.getElementById('stars').innerHTML = stars5 + `<span class="stars-count">${rating}</span>`;

  // Price
  document.getElementById('price').textContent = product.price;
  if (product.oldPrice) {
    document.getElementById('old-price').textContent = product.oldPrice;
    document.getElementById('old-price').style.display = '';
    const pct = Math.round((1 - parsePrice(product.price)/parsePrice(product.oldPrice))*100);
    const pctEl = document.getElementById('promo-pct');
    pctEl.textContent = `-${pct}%`;
    pctEl.style.display = '';
  }

  // Stock
  renderStockBadge(product.stock);

  // Description & attrs (priorité aux données Supabase, sinon fallback hardcodé)
  document.getElementById('product-desc').textContent =
    product.description || product.desc || DESCS.default;

  let attrsData;
  if (product.attributes && product.attributes.length > 0) {
    // Format Supabase : [{title, desc}, …]
    attrsData = product.attributes.map(a => [a.title, a.desc]);
  } else {
    attrsData = product.attrs || ATTRS_MAP.default;
  }
  document.getElementById('attrs').innerHTML = attrsData.map(([k,v]) =>
    `<div class="attr"><strong>${k}</strong><span>${v}</span></div>`).join('');

  // Suggestions (siblings from same category stored in product.siblings)
  const siblings = product.siblings || [];
  document.getElementById('suggest-grid').innerHTML = siblings.slice(0,4).map(s => `
    <div class="suggest-card" onclick="openSibling(${JSON.stringify(s).replace(/"/g,'&quot;')})">
      <img class="suggest-img" src="${s.img}" alt="${s.name}" onerror="this.style.background='var(--primary-xlight)'">
      <div class="suggest-info">
        <div class="suggest-name">${s.name}</div>
        <div class="suggest-price">${s.price}</div>
      </div>
    </div>`).join('');
}

function openSibling(p) {
  CurrentProduct.set({...p, catName: product.catName, siblings: product.siblings});
  window.scrollTo(0,0);
  location.reload();
}

function renderStockBadge(stock) {
  const el = document.getElementById('stock-badge');
  const btn = document.getElementById('btn-cart');
  if (stock === null || stock === undefined) { el.innerHTML = ''; return; }
  if (stock <= 0) {
    el.innerHTML = '<span style="color:#C62828;background:#FFEBEE;padding:5px 12px;border-radius:20px">Rupture de stock</span>';
    btn.disabled = true;
    btn.style.opacity = '0.45';
    btn.style.cursor = 'not-allowed';
  } else if (stock <= 5) {
    el.innerHTML = `<span style="color:#E65100;background:#FFF3E0;padding:5px 12px;border-radius:20px">⚠ Stock limité — ${stock} restant${stock > 1 ? 's' : ''}</span>`;
  } else {
    el.innerHTML = `<span style="color:#2E7D32;background:#E8F5E9;padding:5px 12px;border-radius:20px">✓ En stock (${stock} disponibles)</span>`;
  }
}

function changeQty(d) {
  const maxQty = (product && product.stock > 0) ? product.stock : 999;
  qty = Math.min(maxQty, Math.max(1, qty + d));
  document.getElementById('qty-val').textContent = qty;
}

function addToCartPage() {
  if (!product) return;
  Cart.add({ ...product, qty, priceNum: parsePrice(product.price) });
  updateCartBadge();
  const btn = document.getElementById('btn-cart');
  btn.classList.add('added');
  btn.innerHTML = '<svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Ajouté !';
  showToast(`${product.name} ajouté au panier`);
  setTimeout(() => {
    btn.classList.remove('added');
    btn.innerHTML = '<svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg> Ajouter au panier';
  }, 2000);
}

function toggleWish() {
  wished = !wished;
  const btn = document.getElementById('btn-wish');
  btn.classList.toggle('wished', wished);
  btn.querySelector('span') && (btn.querySelector('span').textContent = wished ? 'Dans ma liste ♥' : 'Ajouter à ma liste de souhaits');
  showToast(wished ? 'Ajouté à votre liste ♥' : 'Retiré de votre liste');
}

function updateCartBadge() {
  const el = document.getElementById('cart-count');
  const n = Cart.count();
  el.textContent = n;
  el.style.display = n > 0 ? 'flex' : 'none';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

init();
</script>
</body>
</html>
