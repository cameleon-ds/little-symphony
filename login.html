<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="logo/favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion — Little Symphony</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="main.css">
<style>
/* → variables in main.css */
body{font-family:var(--sans);background:var(--primary-xlight);color:var(--charcoal);
  -webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column}
img{display:block;max-width:100%}
a{text-decoration:none;color:inherit}
nav{background:rgba(255,255,255,0.93);backdrop-filter:blur(20px);border-bottom:1px solid rgba(237,230,227,0.7)}
.nav-inner{max-width:1280px;margin:0 auto;display:flex;align-items:center;justify-content:center;height:68px;padding:0 2rem}
.logo img{height:48px;width:auto}
.split{flex:1;display:flex;min-height:calc(100vh - 68px)}
.split-visual{flex:1;background:linear-gradient(135deg,#C9A09A 0%,#e8c5c0 50%,#f5e8e6 100%);
  display:flex;align-items:center;justify-content:center;padding:3rem;position:relative;overflow:hidden}
.split-visual::before{content:'';position:absolute;inset:0;
  background:url('images/little-symphony-banner.png') center/cover;
  opacity:0.55}
.split-visual::after{content:'';position:absolute;inset:0;
  background:rgba(0,0,0,0.35)}
.visual-content{position:relative;z-index:1;text-align:center;color:#fff}
.visual-tag{font-size:12px;font-weight:600;letter-spacing:0.15em;text-transform:uppercase;
  background:rgba(255,255,255,0.25);border-radius:20px;padding:6px 16px;display:inline-block;margin-bottom:1.5rem}
.visual-title{font-family:var(--serif);font-size:2.8rem;font-weight:700;line-height:1.1;margin-bottom:1rem}
.visual-sub{font-size:15px;opacity:0.85;line-height:1.6;max-width:320px}
.split-form{width:500px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  padding:3rem;background:#fff}
@media(max-width:900px){.split-visual{display:none}.split-form{width:100%}}
.form-box{width:100%;max-width:380px}
.form-title{font-family:var(--serif);font-size:2rem;margin-bottom:0.4rem}
.form-sub{font-size:14px;color:var(--text-muted);margin-bottom:2rem}
.form-group{margin-bottom:1.2rem}
label{display:block;font-size:13px;font-weight:500;margin-bottom:6px}
input{width:100%;padding:13px 16px;border:1.5px solid var(--border);border-radius:var(--radius-sm);
  font-size:14px;color:var(--charcoal);background:#fff;outline:none;transition:border-color 0.2s;font-family:var(--sans)}
input:focus{border-color:var(--primary)}
.input-wrap{position:relative}
.eye-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--text-muted);display:flex;align-items:center}
.eye-btn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.forgot{display:flex;justify-content:flex-end;margin-top:-0.6rem;margin-bottom:1rem}
.forgot a{font-size:12px;color:var(--text-muted);transition:color 0.2s}
.forgot a:hover{color:var(--primary-dark)}
.btn-submit{width:100%;padding:15px;background:var(--primary);color:#fff;border:none;
  border-radius:40px;font-size:15px;font-weight:600;transition:all 0.25s;
  box-shadow:0 4px 20px rgba(201,160,154,0.35);margin-bottom:1rem}
.btn-submit:hover{background:var(--primary-dark);transform:translateY(-2px)}
.divider{display:flex;align-items:center;gap:1rem;margin:1.2rem 0;font-size:12px;color:var(--text-muted)}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.register-link{text-align:center;font-size:13px;color:var(--text-soft)}
.register-link a{color:var(--primary-dark);font-weight:600}
.error-msg{background:#FFF3F0;border:1px solid #FFCCC7;border-radius:8px;
  padding:10px 14px;font-size:13px;color:#C62828;display:none;margin-bottom:1rem}
</style>
</head>
<body>
<nav>
  <div class="nav-inner">
    <a class="logo" href="index.html"><img src="logo/logo.png" alt="Little Symphony"></a>
  </div>
</nav>

<div class="split">
  <div class="split-visual">
    <div class="visual-content">
      <div class="visual-tag">✦ Little Symphony</div>
      <h2 class="visual-title">Chaque début est<br><em>une mélodie</em></h2>
      <p class="visual-sub">Des produits soigneusement sélectionnés pour les premières années de votre enfant.</p>
    </div>
  </div>
  <div class="split-form">
    <div class="form-box">
      <h1 class="form-title">Bon retour !</h1>
      <p class="form-sub">Connectez-vous à votre compte</p>

      <div class="error-msg" id="error-msg">Email ou mot de passe incorrect.</div>

      <form onsubmit="doLogin(event)">
        <div class="form-group">
          <label for="email">Adresse email</label>
          <input type="email" id="email" placeholder="votre@email.com" required autocomplete="email">
        </div>
        <div class="form-group">
          <label for="password">Mot de passe</label>
          <div class="input-wrap">
            <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            <button type="button" class="eye-btn" onclick="togglePwd()">
              <svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>
        <div class="forgot"><a href="#">Mot de passe oublié ?</a></div>
        <button type="submit" class="btn-submit">Se connecter</button>
      </form>

      <div class="divider">ou</div>
      <p class="register-link">Pas encore de compte ? <a href="register.html">Créer un compte</a></p>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="_shared.js"></script>
<script>
function togglePwd() {
  const el = document.getElementById('password');
  el.type = el.type === 'password' ? 'text' : 'password';
}

async function doLogin(e) {
  e.preventDefault();
  const email = document.getElementById('email').value.trim();
  const pwd   = document.getElementById('password').value;
  const err   = document.getElementById('error-msg');
  const btn   = document.querySelector('.btn-submit');

  err.style.display = 'none';
  btn.textContent = 'Connexion…';
  btn.disabled = true;

  const { data, error } = await _supabase.auth.signInWithPassword({ email, password: pwd });

  btn.textContent = 'Se connecter';
  btn.disabled = false;

  if (error) {
    err.textContent = 'Email ou mot de passe incorrect.';
    err.style.display = 'block';
    return;
  }

  // Récupérer le profil (prénom, nom)
  const { data: profile } = await _supabase
    .from('profiles')
    .select('first_name, last_name, phone, address_line1, city, postal_code, country')
    .eq('id', data.user.id)
    .single();

  Auth.setUser({
    id:        data.user.id,
    email:     data.user.email,
    firstName: profile?.first_name    || '',
    lastName:  profile?.last_name     || '',
    phone:     profile?.phone         || '',
    address:   profile?.address_line1 || '',
    city:      profile?.city          || '',
    zip:       profile?.postal_code   || '',
    country:   profile?.country       || 'Tunisie'
  });

  const next = new URLSearchParams(window.location.search).get('next') || 'profile.html';
  window.location.href = next;
}
</script>
</body>
</html>
